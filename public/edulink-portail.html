/* ══ BASE ══ */
*{margin:0;box-sizing:border-box}
:root{
  --navy:#1e3a5f;
  --teal:#0f6e56;
  --teal-light:#e1f5ee;
  --gold:#c97c1a;
  --red:#dc2626;
  --amber:#d97706;
  --green:#059669;
  --bg:#f0f7f4;
  --white:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --card:#ffffff;
  --radius:16px;
}
body{font-family:'Poppins',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}

/* ══ LOGIN ══ */
#login-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(160deg,#0f6e56 0%,#1e3a5f 60%,#0f2040 100%);
  display:flex;align-items:center;justify-content:center;z-index:2000;
  padding:1rem;
}
.login-card{
  background:#fff;border-radius:24px;padding:2rem 1.8rem;width:100%;max-width:400px;
  box-shadow:0 30px 80px rgba(0,0,0,.3);
}
.login-brand{text-align:center;margin-bottom:2rem}
.login-brand .brand-ico{
  width:70px;height:70px;border-radius:20px;
  background:linear-gradient(135deg,#0f6e56,#1e3a5f);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;margin:0 auto .75rem;box-shadow:0 8px 20px rgba(15,110,86,.3);
}
.login-brand h1{font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;color:#1e3a5f;margin-bottom:2px}
.login-brand p{font-size:12.5px;color:#6b7280}
.login-tag{
  display:inline-flex;align-items:center;gap:5px;
  background:#e1f5ee;color:#0f6e56;font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:20px;margin-top:6px;
}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
.form-group input{
  width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;
  font-size:14px;font-family:'Poppins',sans-serif;outline:none;transition:border-color .15s;
}
.form-group input:focus{border-color:#0f6e56;box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.login-btn{
  width:100%;padding:13px;background:linear-gradient(135deg,#0f6e56,#1e3a5f);
  color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;
  font-family:'Poppins',sans-serif;cursor:pointer;transition:all .2s;margin-top:.5rem;
  letter-spacing:.02em;
}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(15,110,86,.35)}
.login-btn:disabled{opacity:.6;transform:none;cursor:default}
.login-error{color:#dc2626;font-size:12px;text-align:center;margin-top:.75rem;display:none;background:#fee2e2;padding:8px 12px;border-radius:8px}
.login-back{text-align:center;margin-top:1.2rem;font-size:12px;color:#6b7280}
.login-back a{color:#0f6e56;font-weight:600;text-decoration:none}

/* ══ JOUR 9 — OTP SMS ══ */
.login-tabs{display:flex;background:#f3f4f6;border-radius:10px;padding:4px;margin-bottom:1.5rem;gap:4px}
.login-tab{flex:1;padding:8px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;color:#6b7280;border:none;background:transparent;font-family:'Poppins',sans-serif;transition:all .15s}
.login-tab.active{background:#fff;color:#0f6e56;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.otp-input-wrap{display:flex;gap:8px;justify-content:center;margin:1rem 0}
.otp-digit{width:44px;height:52px;border:2px solid #e5e7eb;border-radius:10px;font-size:22px;font-weight:700;text-align:center;font-family:'Nunito',sans-serif;color:#1e3a5f;outline:none;transition:border-color .15s}
.otp-digit:focus{border-color:#0f6e56;box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.otp-digit.filled{border-color:#0f6e56;background:#f0fdf4}
.otp-timer{text-align:center;font-size:12px;color:#6b7280;margin-bottom:.5rem}
.otp-timer span{font-weight:700;color:#0f6e56}
.phone-flag{display:flex;align-items:center;gap:6px;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Poppins',sans-serif;width:100%;outline:none;transition:border-color .15s}
.phone-flag:focus-within{border-color:#0f6e56;box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.phone-flag .flag{font-size:18px;flex-shrink:0}
.phone-flag .prefix{color:#6b7280;font-weight:600;flex-shrink:0}
.phone-flag input{border:none;outline:none;flex:1;font-size:14px;font-family:'Poppins',sans-serif;background:transparent}


/* ══ APP ══ */
#app-portail{display:none;max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:80px}

/* ══ HEADER ══ */
.portail-header{
  background:linear-gradient(135deg,#0f6e56,#1e3a5f);
  padding:1.2rem 1.2rem .8rem;position:sticky;top:0;z-index:100;
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.header-logo{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;color:#fff;display:flex;align-items:center;gap:6px}
.header-actions{display:flex;gap:8px;align-items:center}
.notif-btn{
  width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);
  border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  position:relative;
}
.notif-badge{
  position:absolute;top:-2px;right:-2px;width:16px;height:16px;
  background:#dc2626;border-radius:50%;font-size:9px;font-weight:700;
  color:#fff;display:none;align-items:center;justify-content:center;border:2px solid #0f6e56;
}
.header-greeting{color:rgba(255,255,255,.85);font-size:12.5px}
.header-greeting strong{color:#fff;font-size:14px;display:block;font-weight:700}
.student-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:20px;padding:4px 12px;font-size:11.5px;color:#fff;font-weight:600;margin-top:4px;
}

/* ══ NAV BAS ══ */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:500px;
  background:#fff;border-top:1px solid #e5e7eb;
  display:flex;z-index:100;
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;cursor:pointer;color:#9ca3af;transition:color .15s;
  border:none;background:transparent;font-family:'Poppins',sans-serif;
}
.nav-item.active{color:#0f6e56}
.nav-item .nav-ico{font-size:20px;margin-bottom:2px;line-height:1}
.nav-item .nav-lbl{font-size:9.5px;font-weight:600}
.nav-badge{
  position:absolute;top:6px;right:50%;transform:translateX(50%);
  width:16px;height:16px;background:#dc2626;border-radius:50%;
  font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center;
}
.nav-item{position:relative}
/* B2.4 */
.nav-plus-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:199;opacity:0;pointer-events:none;transition:opacity .2s}
.nav-plus-overlay.open{opacity:1;pointer-events:all}
.nav-plus-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:500px;background:#fff;border-radius:20px 20px 0 0;z-index:200;padding:0 0 8px;transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 32px rgba(0,0,0,.12)}
.nav-plus-sheet.open{transform:translateX(-50%) translateY(0)}
.nav-plus-handle{width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:12px auto 8px}
.nav-plus-title{font-size:12px;font-weight:700;color:#9ca3af;letter-spacing:.06em;padding:0 20px 8px;text-transform:uppercase}
.nav-plus-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:0 12px 12px}
.nav-plus-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:none;background:transparent;cursor:pointer;border-radius:14px;transition:background .15s;font-family:Poppins,sans-serif;color:#374151;position:relative}
.nav-plus-item:active,.nav-plus-item:hover{background:#f0f7f4}
.nav-plus-item .pi-ico{font-size:24px;line-height:1}
.nav-plus-item .pi-lbl{font-size:10px;font-weight:600;text-align:center}
.nav-plus-item .pi-badge{position:absolute;top:10px;right:calc(50% - 16px);width:16px;height:16px;background:#dc2626;border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:none;align-items:center;justify-content:center}

/* ══ PAGES ══ */
.page{display:none;padding:1rem 1rem 0;animation:fadeUp .2s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ══ CARDS ══ */
.card{background:#fff;border-radius:var(--radius);border:1px solid #e5e7eb;margin-bottom:1rem;overflow:hidden}
.card-header{padding:.9rem 1rem .6rem;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700;color:#374151;display:flex;align-items:center;gap:6px}
.card-body{padding:1rem}
.card-link{font-size:11.5px;color:#0f6e56;font-weight:600;text-decoration:none;cursor:pointer}

/* ══ STATS ACCUEIL ══ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.stat-card{
  background:#fff;border-radius:14px;border:1px solid #e5e7eb;
  padding:.9rem;display:flex;align-items:center;gap:.75rem;
}
.stat-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-ico.teal{background:#e1f5ee}
.stat-ico.red{background:#fee2e2}
.stat-ico.amber{background:#fef9c3}
.stat-ico.blue{background:#dbeafe}
.stat-val{font-size:22px;font-weight:800;font-family:'Nunito',sans-serif;line-height:1}
.stat-lbl{font-size:10.5px;color:#6b7280;font-weight:500}

/* ══ BADGES ══ */
.badge{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap;display:inline-block}
.badge.green{background:#dcfce7;color:#059669}
.badge.red{background:#fee2e2;color:#dc2626}
.badge.amber{background:#fef9c3;color:#d97706}
.badge.blue{background:#dbeafe;color:#1d4ed8}
.badge.gray{background:#f3f4f6;color:#6b7280}
.badge.teal{background:#e1f5ee;color:#0f6e56}
.badge.purple{background:#ede9fe;color:#6d28d9}
.badge.warning{background:#fef9c3;color:#d97706}
.badge.info{background:#dbeafe;color:#1d4ed8}
.badge.success{background:#dcfce7;color:#059669}
.badge.error{background:#fee2e2;color:#dc2626}

/* ══ LISTES ══ */
.list-item{
  padding:.85rem 1rem;border-bottom:1px solid #f3f4f6;
  display:flex;align-items:flex-start;gap:.75rem;
}
.list-item:last-child{border-bottom:none}
.li-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.li-body{flex:1;min-width:0}
.li-title{font-size:13px;font-weight:600;color:#111827;margin-bottom:2px}
.li-sub{font-size:11.5px;color:#6b7280}
.li-right{text-align:right;flex-shrink:0}

/* ══ NOTES ══ */
.note-big{font-size:28px;font-weight:800;font-family:'Nunito',sans-serif}
.note-big.good{color:#059669}
.note-big.avg{color:#d97706}
.note-big.bad{color:#dc2626}
.moy-bar{height:8px;background:#e5e7eb;border-radius:4px;margin:8px 0 4px;overflow:hidden}
.moy-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#0f6e56,#1d9e75);transition:width .8s ease}

/* ══ BULLETIN ══ */
.bulletin-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb;margin-bottom:1rem}
.bulletin-top{background:linear-gradient(135deg,#1e3a5f,#0f6e56);padding:1rem 1.2rem;color:#fff}
.bulletin-top h3{font-size:15px;font-weight:700;margin-bottom:2px}
.bulletin-top p{font-size:11.5px;opacity:.75}
.bulletin-moy{font-size:32px;font-weight:800;font-family:'Nunito',sans-serif;margin:.5rem 0}
.bulletin-table{width:100%;border-collapse:collapse}
.bulletin-table th{font-size:10px;font-weight:700;color:#6b7280;padding:8px 12px;text-align:left;border-bottom:1px solid #e5e7eb;text-transform:uppercase;background:#f9fafb}
.bulletin-table td{font-size:12.5px;padding:9px 12px;border-bottom:1px solid #f3f4f6;color:#374151}
.bulletin-table tr:last-child td{border-bottom:none}
.periode-sel{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.periode-btn{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;
  font-family:'Poppins',sans-serif;transition:all .15s;
}
.periode-btn.active{background:#0f6e56;border-color:#0f6e56;color:#fff}
.print-btn{
  width:100%;padding:11px;background:#1e3a5f;color:#fff;border:none;
  border-radius:10px;font-size:13px;font-weight:600;font-family:'Poppins',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:1rem;
}

/* ══ MESSAGES ══ */
.msg-composer{margin-bottom:1rem}
.msg-composer textarea{
  width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;
  font-size:13px;font-family:'Poppins',sans-serif;outline:none;resize:none;
  transition:border-color .15s;
}
.msg-composer textarea:focus{border-color:#0f6e56}
.msg-send-btn{
  margin-top:6px;padding:9px 18px;background:#0f6e56;color:#fff;border:none;
  border-radius:8px;font-size:12.5px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;
}
.msg-bubble{
  background:#f0f7f4;border-radius:12px 12px 12px 4px;
  padding:.75rem 1rem;margin-bottom:.75rem;border-left:3px solid #0f6e56;
}
.msg-bubble.sent{background:#e1f5ee;border-left-color:#1d9e75;border-radius:12px 12px 4px 12px}
.msg-bubble .mb-from{font-size:11px;font-weight:700;color:#0f6e56;margin-bottom:3px}
.msg-bubble .mb-text{font-size:13px;color:#374151;line-height:1.6}
.msg-bubble .mb-date{font-size:10.5px;color:#9ca3af;margin-top:4px;text-align:right}

/* ══ PAIEMENTS ══ */
.pay-progress{margin:1rem 0}
.pay-bar{height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;margin-top:6px}
.pay-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#059669,#1d9e75);transition:width .8s}
.pay-amounts{display:flex;justify-content:space-between;font-size:11px;color:#6b7280;margin-top:4px}



/* ══ ENSEIGNANTS PORTAIL ★ JOUR 13 ══ */
.prof-contact-card{
  background:linear-gradient(135deg,#1e3a5f,#2d5a8e);
  border-radius:14px;color:#fff;padding:1rem 1.2rem;
  display:flex;align-items:center;gap:1rem;margin-bottom:.75rem;
}
.pcc-avatar{
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,255,255,.2);display:flex;
  align-items:center;justify-content:center;
  font-size:17px;font-weight:700;flex-shrink:0;
}
.pcc-info .pi-nom{font-size:13.5px;font-weight:700;margin-bottom:2px;}
.pcc-info .pi-spec{font-size:11.5px;opacity:.75;}
.pcc-info .pi-mat{font-size:11px;opacity:.6;margin-top:2px;}


/* ══ ENSEIGNANTS PORTAIL ★ JOUR 13 ══ */
.prof-card{
  display:flex;align-items:center;gap:.85rem;
  padding:.9rem 1rem;border-bottom:1px solid #f3f4f6;
}
.prof-card:last-child{border-bottom:none}
.prof-avatar{

<div id="login-screen">

      <button class="login-tab active" id="tab-sms-btn" onclick="switchLoginTab('sms')">📱 SMS OTP</button>

    </div>

    <!-- ══ TAB SMS OTP ══ -->
    <div id="tab-sms">
      <!-- Étape 1 : saisie numéro -->
      <div id="otp-step1">
        <div class="form-group">
          <label>Numéro de téléphone</label>
          <div class="phone-flag">
            <span class="flag">🇧🇯</span>
            <span class="prefix">+229</span>
            <input type="tel" id="otp-phone" autocomplete="off" placeholder="01 97 09 81 17" maxlength="10"
              oninput="this.value=this.value.replace(/\D/g,'')"
              onkeypress="if(event.key==='Enter')envoyerOTP()">
          </div>
        </div>
        <button class="login-btn" id="btn-envoyer-otp" onclick="envoyerOTP()">
          📱 Recevoir le code SMS →
        </button>
        <div class="login-error" id="otp-error1"></div>
      </div>

      <!-- Étape 2 : saisie code OTP -->
      <div id="otp-step2" style="display:none">
        <div style="text-align:center;margin-bottom:1rem">
          <div style="font-size:13px;color:#374151;font-weight:600">Code envoyé au</div>
          <div style="font-size:15px;font-weight:700;color:#0f6e56" id="otp-phone-display"></div>
        </div>
        <div class="otp-input-wrap" id="otp-digits-wrap">
          <input class="otp-digit" type="text" maxlength="1" id="d0" oninput="otpNext(this,0)">
          <input class="otp-digit" type="text" maxlength="1" id="d1" oninput="otpNext(this,1)">
          <input class="otp-digit" type="text" maxlength="1" id="d2" oninput="otpNext(this,2)">
          <input class="otp-digit" type="text" maxlength="1" id="d3" oninput="otpNext(this,3)">
          <input class="otp-digit" type="text" maxlength="1" id="d4" oninput="otpNext(this,4)">
          <input class="otp-digit" type="text" maxlength="1" id="d5" oninput="otpNext(this,5)">
        </div>
        <div class="otp-timer">⏱ Code valable <span id="otp-countdown">5:00</span></div>

        <div class="login-error" id="otp-error2"></div>
        <div style="text-align:center;margin-top:.75rem">
          <span style="font-size:12px;color:#6b7280">Pas reçu ? </span>

      <div class="login-error" id="login-error"></div>

    position:fixed;bottom:80px;right:16px;z-index:999;
    background:#1e3a5f;color:#fff;border-radius:50px;
    padding:10px 16px;font-size:12px;font-weight:700;

    // Mise à jour immédiate de l'état du bouton flottant, dès le HTML rendu
    // (avant l'init Firebase qui n'est appelée qu'après 1,5s)
    (function(){
      var fab = document.getElementById('notif-fab');
      if (!fab) return;
      if (!('Notification' in window)) return; // reste caché
      if (Notification.permission === 'granted') return; // reste caché
      if (Notification.permission === 'denied') {
        fab.innerHTML        = '🔕 Notifications bloquées — Autorisez dans les paramètres Chrome';
        fab.style.background = '#6b7280';

async function telechargerReleveOfficiel(releveId) {
  const JsPDF = getJsPDFPortail();
  if (!JsPDF) { showToast('jsPDF non chargé — réessayez', 'error'); return; }
  const releve = tousReleves.find(r => r.id === releveId);
  if (!releve) { showToast('Relevé introuvable', 'error'); return; }
  const snap = releve.snapshot_notes;
  if (!snap) { showToast('Snapshot manquant pour ce relevé', 'error'); return; }
  showToast('Génération du relevé officiel…', 'info');

  const TEAL  = [15, 110, 86];
  const NAVY  = [30, 58, 95];
  const LIGHT = [225, 245, 238];
  const GREEN = [5, 150, 105];
  const RED   = [220, 38, 38];
  const AMBER = [217, 119, 6];
  const GRAY  = [107, 114, 128];

  const doc = new JsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const pw = doc.internal.pageSize.getWidth();
  const labelMen = { tres_bien:'Très Bien', bien:'Bien', assez_bien:'Assez Bien', passable:'Passable' };
  const safe = s => (s||'').replace(/[^\x00-\x7E]/g, c => c.normalize('NFD').replace(/[\u0300-\u036f]/g,''));

  // ── Entête ──
  doc.setFillColor(...TEAL);
  doc.rect(0, 0, pw, 36, 'F');
  doc.setFillColor(...NAVY);
  doc.rect(0, 36, pw, 2.5, 'F');

  doc.setTextColor(255,255,255);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text(safe(window.currentEcoleNom || currentEtudiant?.ecole_nom || 'Etablissement'), 14, 14);
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('RELEVE DE NOTES OFFICIEL — LMD CAMES', 14, 22);
  doc.setTextColor(200,235,225); doc.setFontSize(8);
  doc.text('Publie le ' + (releve.publie_le ? new Date(releve.publie_le).toLocaleDateString('fr-FR') : '—'), 14, 29);
  if (releve.numero_releve) {
    doc.setTextColor(255,255,255); doc.setFontSize(8);
    doc.text('N° ' + releve.numero_releve, pw - 14, 29, { align:'right' });
  }

  let y = 44;

  // ── Bloc étudiant ──
  doc.setFillColor(...LIGHT);
  doc.roundedRect(14, y, pw - 28, 30, 3, 3, 'F');
  doc.setDrawColor(...TEAL); doc.setLineWidth(0.3);
  doc.roundedRect(14, y, pw - 28, 30, 3, 3, 'S');

  doc.setTextColor(...NAVY); doc.setFontSize(12); doc.setFont('helvetica','bold');
  doc.text(safe((currentEtudiant?.nom||'') + ' ' + (currentEtudiant?.prenom||'')), 22, y + 9);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...GRAY);
  doc.text('Matricule : ' + (currentEtudiant?.matricule || '—'), 22, y + 16);
  doc.text(safe('Semestre : ' + (snap.semestre_libelle||'—') + '  |  Niveau : ' + (snap.niveau||'—')), 22, y + 22);
  doc.text(safe('Programme : ' + (snap.programme_intitule||'—')), 22, y + 28);

  // Résultat badge
  const admis = snap.semestre_valide;
  doc.setFillColor(...(admis ? GREEN : RED));
  doc.roundedRect(pw - 50, y + 3, 36, 24, 3, 3, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text(snap.moyenne_semestre !== null ? Number(snap.moyenne_semestre).toFixed(2) : '—', pw - 32, y + 13, { align:'center' });
  doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.text('/ 20', pw - 32, y + 18, { align:'center' });
  doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text(admis ? 'VALIDE' : 'AJOURNE', pw - 32, y + 24, { align:'center' });

  y += 36;

  // ── Récapitulatif ──
  doc.setTextColor(...TEAL); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('Recapitulatif semestriel', 14, y); y += 5;
  doc.autoTable({
    startY: y,
    head: [['Crédits validés', 'Crédits tentés', 'Moyenne générale', 'Mention', 'Décision']],
    body: [[
      (snap.credits_valides ?? '—') + ' / 30 CECT',
      (snap.credits_tentes ?? '—') + ' CECT',
      snap.moyenne_semestre !== null ? Number(snap.moyenne_semestre).toFixed(2) + ' / 20' : '—',
      safe(labelMen[snap.mention] || snap.mention || '—'),
      safe(admis ? 'Semestre validé ✓' : 'Semestre non validé'),
    ]],
    styles: { fontSize: 9, cellPadding: 4 },
    headStyles: { fillColor: TEAL, textColor: [255,255,255], fontStyle:'bold' },
    bodyStyles: { textColor: NAVY },
    alternateRowStyles: { fillColor: [245,250,248] },
    margin: { left: 14, right: 14 },
  });
  y = doc.lastAutoTable.finalY + 8;

  // ── Tableau UEs ──
  doc.setTextColor(...TEAL); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('Detail par Unite d\'Enseignement', 14, y); y += 5;
  const ues = (snap.resultats_ue || []).map(ue => [
    safe(ue.ue_code || ''),
    safe(ue.ue_intitule || ''),
    ue.type_ue || '',
    ue.moyenne_ue !== null ? Number(ue.moyenne_ue).toFixed(2) : '—',
    (ue.credits_acquis ?? 0) + ' / ' + (ue.ue_credits ?? 0),
    ue.ue_validee ? 'Valide' : ue.est_exclu ? 'Exclu' : 'Non valide',
  ]);
  doc.autoTable({
    startY: y,
    head: [['Code', 'Intitulé UE', 'Type', 'Moy.', 'Crédits', 'Statut']],
    body: ues,
    styles: { fontSize: 8, cellPadding: 3 },
    headStyles: { fillColor: NAVY, textColor: [255,255,255], fontStyle:'bold' },
    columnStyles: {
      0: { cellWidth: 22 },
      1: { cellWidth: 'auto' },
      2: { cellWidth: 18, halign:'center' },
      3: { cellWidth: 16, halign:'center' },
      4: { cellWidth: 20, halign:'center' },
      5: { cellWidth: 22, halign:'center' },
    },
    alternateRowStyles: { fillColor: [248,250,252] },
    didParseCell(data) {
      if (data.section === 'body' && data.column.index === 5) {
        const v = data.cell.text[0];
        if (v === 'Valide') data.cell.styles.textColor = GREEN;
        else if (v === 'Non valide') data.cell.styles.textColor = RED;
        else data.cell.styles.textColor = AMBER;
      }
    },
    margin: { left: 14, right: 14 },
  });

  // ── Pied de page ──
  const py = doc.internal.pageSize.getHeight() - 14;
  doc.setDrawColor(...TEAL); doc.setLineWidth(0.3);
  doc.line(14, py - 6, pw - 14, py - 6);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...GRAY);

async function chargerMessages() {
  // On charge plus large (60) car le filtre client va trier ensuite.
  // Le filtre JS qui suit garde uniquement ce qui concerne le parent courant.
  let q = db.from('messages').select('*').order('created_at',{ascending:false}).limit(60);
  if (currentEcoleId) q = q.eq('ecole_id', currentEcoleId);
  const { data } = await q;
  const tous = data || [];

  // ── FILTRE HÉRITAGE J-1 ────────────────────────────────────────────
  // Le schéma `messages` n'a pas de etudiant_id : on filtre par heuristique.
  // Le BO envoie au PARENT (destinataire_nom = etudiant.nom_parent), donc on
  // matche essentiellement sur le nom_parent stocké sur l'étudiant courant.
  //
  // Un message est visible pour ce parent si :
  //   1. C'est lui-même qui l'a envoyé (expediteur_role=parent + nom matchant)
  //   2. Le destinataire_nom contient son nom de parent
  //   3. Le destinataire_nom contient le nom OU prénom de l'étudiant (cas
  //      historique où l'admin aurait écrit le nom de l'enfant)
  //   4. C'est une annonce générale (destinataire_role=parent ET nom vide ou
  //      mots-clés "tous"/"parents"/"famille")
  // ────────────────────────────────────────────────────────────────────
  const etu = currentEtudiant;
  const nomParent = (etu?.nom_parent || '').toLowerCase().trim();
  const etuNom    = (etu?.nom    || '').toLowerCase().trim();
  const etuPrenom = (etu?.prenom || '').toLowerCase().trim();

  // Tokens du nom_parent (ex "SANTANA René" → ["santana", "rené"])
  // On exige un match sur un token >= 3 caractères pour éviter les faux positifs.
  const tokensParent = nomParent.split(/\s+/).filter(t => t.length >= 3);

  function meConcerne(m) {
    const dest = (m.destinataire_nom || '').toLowerCase().trim();
    const destRole = (m.destinataire_role || '').toLowerCase().trim();
    const exp  = (m.expediteur_nom || '').toLowerCase().trim();
    const expRole = (m.expediteur_role || '').toLowerCase().trim();

    // Cas 1 : envoyé par ce parent lui-même
    if (expRole === 'parent') {
      if (nomParent && exp.includes(nomParent)) return true;
      if (tokensParent.some(t => exp.includes(t))) return true;
    }
    // Cas 2 : nom_parent matche le destinataire (cas principal — messages groupés BO)
    if (nomParent && dest.includes(nomParent)) return true;
    // Match plus permissif sur tokens : tous les tokens du nom_parent doivent
    // être présents dans le destinataire (ex "DAVI Job" ⊂ "DAVI Job Constant")
    if (tokensParent.length && tokensParent.every(t => dest.includes(t))) return true;
    // Cas 3 : nom/prénom étudiant dans destinataire (historique)
    if (etuNom    && dest.includes(etuNom))    return true;
    if (etuPrenom && dest.includes(etuPrenom)) return true;
    // Cas 4 : annonce générale (destinataire_role=parent)
    if (destRole === 'parent') {
      if (!dest) return true;
      if (/(parents|tous|famille|toutes les familles)/.test(dest)) return true;
    }
    return false;
  }

  tousMessages = tous.filter(meConcerne);
  // Compter seulement les messages de l'admin/prof non lus
  const nonLus = tousMessages.filter(m =>
    (m.expediteur_role === 'admin' || m.expediteur_role === 'enseignant') && !m.lu
  ).length;
  const b1 = document.getElementById('msg-badge');
  const b2 = document.getElementById('nav-msg-badge');
  if (b1) { b1.style.display = nonLus > 0 ? 'flex' : 'none'; if(nonLus>0) b1.textContent = nonLus; }
  if (b2) { b2.style.display = nonLus > 0 ? 'flex' : 'none'; if(nonLus>0) b2.textContent = nonLus; }
}

async function calculerRangGlobalPortail() {
  rangEtudiantPortail = '-';
  if (!currentEtudiant?.filiere || !currentEtudiant?.niveau || !currentEtudiant?.ecole_id) return;
  try {
    const { data: classmates } = await db.from('etudiants')
      .select('id')
      .eq('ecole_id', currentEtudiant.ecole_id)
      .eq('filiere', currentEtudiant.filiere)
      .eq('niveau', currentEtudiant.niveau);
    if (!classmates?.length) return;
    const ids = classmates.map(c => c.id);
    const { data: allNotes } = await db.from('notes_lmd')
      .select('etudiant_id,valeur')
      .in('etudiant_id', ids);
    const moyParEtu = {};
    (allNotes||[]).forEach(n => {
      if (!moyParEtu[n.etudiant_id]) moyParEtu[n.etudiant_id] = { pts:0, coef:0 };
      moyParEtu[n.etudiant_id].pts += (n.valeur||0);
      moyParEtu[n.etudiant_id].coef += 1;
    });
    const classements = Object.entries(moyParEtu)
      .map(([id,v]) => ({ id, moy: v.coef ? v.pts/v.coef : 0 }))
      .sort((a,b) => b.moy - a.moy);
    const idx = classements.findIndex(c => c.id === currentEtudiant.id);
    const n = ids.length;
    if (idx === 0) rangEtudiantPortail = '1er/' + n;
    else if (idx > 0) rangEtudiantPortail = (idx + 1) + 'e/' + n;
  } catch(e) {
    console.warn('[Rang Portail]', e.message);
  }
}

}

function afficherNotes() {
  const page = document.getElementById('page-notes');
  if (!currentEtudiant) { page.innerHTML = '<div class="empty"><div class="e-ico">📊</div><p>Aucun étudiant lié à ce compte.</p></div>'; return; }

  // Toutes les périodes y compris EXAM-xxx
  const periodes = [...new Set(toutesNotes.map(n => n.periode))].sort();
  // Trier : S1/S2/T1... en premier, EXAM-xxx à la fin
  periodes.sort((a,b) => {
    const aExam = a.startsWith('EXAM-');
    const bExam = b.startsWith('EXAM-');
    if (aExam && !bExam) return 1;
    if (!aExam && bExam) return -1;
    return a.localeCompare(b);
  });

  // Libellé lisible pour les périodes
  function labelPeriode(p) {
    if (!p) return 'Toutes';
    if (p === 'S1') return 'Semestre 1';
    if (p === 'S2') return 'Semestre 2';
    if (p === 'T1') return 'Trimestre 1';
    if (p === 'T2') return 'Trimestre 2';
    if (p === 'T3') return 'Trimestre 3';
    if (p.startsWith('EXAM-')) return '📝 Examen';
    return p;
  }

  // Ajouter "Toutes" si plusieurs périodes
  const periodesAvecTout = periodes.length > 1 ? ['', ...periodes] : periodes;
  let periodeActive = periodes[0] || '';

  function renderNotes(periode) {
    const notes = periode ? toutesNotes.filter(n => n.periode === periode) : toutesNotes;
    let moy = 0, totalPts = 0, totalCoeff = 0;
    notes.forEach(n => { totalPts += n.note*(n.coefficient||1); totalCoeff += (n.coefficient||1); });
    moy = totalCoeff > 0 ? totalPts/totalCoeff : 0;
    const app = getApp(moy);

    return `
      ${notes.length ? `
      <div class="bulletin-card">
        <div class="bulletin-top">
          <h3>${currentEtudiant.nom} ${currentEtudiant.prenom}</h3>
          <p>${currentEtudiant.filiere} · ${currentEtudiant.niveau} · ${labelPeriode(periode)||'Toutes périodes'}</p>
          <div class="bulletin-moy">${moy.toFixed(2)}/20</div>
          <span class="badge ${app.cls}">${app.label}</span>
          <div style="margin-top:8px">
            <div class="moy-bar"><div class="moy-fill" style="width:${Math.min(100,moy/20*100)}%"></div></div>
          </div>
        </div>
        <table class="bulletin-table">
          <tr><th>Matière</th><th>Note</th><th>Coeff</th><th>Mention</th></tr>
          ${notes.map(n => { const a=getApp(n.note); return `
            <tr>
              <td>${n.matiere}</td>
              <td><strong class="${getNoteClass(n.note)==='good'?'':''}"; style="color:${n.note>=10?'#059669':'#dc2626'}">${n.note}/20</strong></td>
              <td>${n.coefficient||1}</td>
              <td><span class="badge ${a.cls}">${a.label}</span></td>
            </tr>`}).join('')}
          <tr style="background:#f9fafb;font-weight:700">
            <td>Moyenne générale</td>
            <td style="color:${moy>=10?'#059669':'#dc2626'};font-weight:800">${moy.toFixed(2)}/20</td>
            <td>${totalCoeff}</td>
            <td><span class="badge ${app.cls}">${app.label}</span></td>
          </tr>
        </table>
        <div style="padding:1rem">
          <div style="display:flex;gap:8px;margin-top:1rem">
          <button class="print-btn" style="flex:1" onclick="imprimerBulletin('${periode}')">🖨️ Imprimer</button>
          <button class="print-btn" style="flex:1;background:linear-gradient(135deg,#059669,#047857)" onclick="telechargerBulletinPDFPortail('${periode}')">⬇️ Télécharger PDF</button>
        </div>
        </div>
      </div>` : '<div class="empty"><div class="e-ico">📭</div><p>Aucune note pour cette période.</p></div>'}`;
  }

  page.innerHTML = `<div class="page-pad">
    <div class="section-title">📊 Notes & Bulletins</div>
    ${periodesAvecTout.length > 1 ? `<div class="periode-sel" id="periode-sel">
      ${periodesAvecTout.map(p => `<button class="periode-btn ${p===periodeActive?'active':''}" onclick="changerPeriode('${p}')">${labelPeriode(p)||'Toutes'}</button>`).join('')}
    </div>` : ''}
    <div id="notes-container">${renderNotes(periodeActive)}</div>
  </div>`;

  window.changerPeriode = function(p) {
    periodeActive = p;
    document.querySelectorAll('.periode-btn').forEach(b => b.classList.toggle('active', b.textContent===(labelPeriode(p)||'Toutes')));
    document.getElementById('notes-container').innerHTML = renderNotes(p);
  };
}

  if (p === 'T2') return 'Trimestre 2';
  if (p === 'T3') return 'Trimestre 3';

      var m = msgs[i];

      var cls = estAdmin ? 'recu' : 'envoye';

      threadHTML += '<div class="mb2-text">' + (m.contenu||'') + '</div>';
      threadHTML += '<div class="mb2-date">' + fmtDateTime(m.created_at) + '</div>';

    threadHTML = "<div class=\"empty\" style=\"margin:1.5rem 0\"><div class=\"e-ico\">📭</div><p>Aucun message disponible.</p></div>";
  }

  var unreadBadge = nonLus > 0 ? '<span class="msg-unread-badge">' + nonLus + ' non lu' + (nonLus>1?'s':'') + '</span>' : '';

  // Build HTML safely without apostrophe issues
  var composeHTML = '<div class="msg-compose-v2">' +
    '<input type="text" id="msg-objet" placeholder="Objet (optionnel)">' +
    '<textarea id="msg-contenu" rows="3" placeholder="Votre message..."></textarea>' +

    '</div>';

  page.innerHTML = '<div style="padding:.75rem 1rem 0">' +
    '<div class="section-title">&#9993;&#65039; Messagerie ' + unreadBadge + '</div>' +
    '</div>' +

async function marquerMessagesAdminLus() {
  const nonLus = tousMessages.filter(m =>
    (m.expediteur_role === 'admin' || m.expediteur_role === 'enseignant') && !m.lu
  );
  if (!nonLus.length) {
    // Force hide badges anyway
    const b1 = document.getElementById('msg-badge');
    const b2 = document.getElementById('nav-msg-badge');
    if (b1) b1.style.display = 'none';
    if (b2) b2.style.display = 'none';
    return;
  }
  const ids = nonLus.map(m => m.id);
  try {
    await db.from('messages').update({ lu: true }).in('id', ids);
  } catch(_) {}
  nonLus.forEach(m => { m.lu = true; });
  const b1 = document.getElementById('msg-badge');
  const b2 = document.getElementById('nav-msg-badge');
  if (b1) b1.style.display = 'none';
  if (b2) b2.style.display = 'none';
  // Masquer le badge dans le titre de la page messages
  const inPageBadge = document.querySelector('.msg-unread-badge');
  if (inPageBadge) inPageBadge.style.display = 'none';
}

async function verifierOTP() {
  const code = [0,1,2,3,4,5].map(i => document.getElementById('d'+i).value).join('');
  if (code.length < 6) { showOTPError(2, 'Entrez les 6 chiffres du code.'); return; }
  const btn = document.getElementById('btn-verifier-otp');
  btn.disabled = true; btn.textContent = 'Vérification...';

  if (!otpEtudiantTrouve) {
    showOTPError(2, 'Session expirée. Recommencez depuis le début.');
    btn.disabled = false; btn.textContent = '✅ Confirmer le code';
    return;
  }

  // ─── 2026-05-12 : vérification de l'OTP via Edge Function bright-handler ───
  try {
    const resp = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verify', telephone: otpTelephone, code })
    });
    const result = await resp.json();
    if (!resp.ok || !result.success) {
      console.error('[OTP] Échec vérification:', result);
      showOTPError(2, result.error || 'Code incorrect. Vérifiez et réessayez.');
      btn.disabled = false; btn.textContent = '✅ Confirmer le code';
      [0,1,2,3,4,5].forEach(i => { const d = document.getElementById('d'+i); d.value=''; d.classList.remove('filled'); });
      document.getElementById('d0').focus();
      return;
    }
    console.log('[OTP] ✅ Code vérifié par bright-handler');

    // ─── Étape 4 (2026-05-14) : échange auth_token → session Supabase ───
    // Le matricule ne quitte jamais le serveur. Le portail reçoit
    // un auth_token temporaire (32 bytes, expire 5 min, usage unique)
    // qu'il échange contre une vraie session Supabase Auth.
    const authToken = result.auth_token;
    if (!authToken) {
      showOTPError(2, 'Token d\'authentification manquant. Contactez l\'administration.');
      btn.disabled = false; btn.textContent = '✅ Confirmer le code';
      return;
    }

    // Appel exchange : bright-handler vérifie le token et retourne la session
    btn.textContent = 'Connexion...';
    let exchangeResult;
    try {
      const exchResp = await fetch(EDGE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'exchange', auth_token: authToken })
      });
      exchangeResult = await exchResp.json();
      if (!exchResp.ok || !exchangeResult.success) {
        console.error('[OTP] Échec exchange:', exchangeResult);
        showOTPError(2, exchangeResult.error || 'Erreur de connexion. Réessayez.');
        btn.disabled = false; btn.textContent = '✅ Confirmer le code';
        return;

      console.error('[OTP] Erreur réseau exchange:', exchErr);
      showOTPError(2, 'Erreur réseau. Réessayez.');
      btn.disabled = false; btn.textContent = '✅ Confirmer le code';
      return;
    }

    // Initialiser la session Supabase avec les tokens reçus
    const { error: sessionError } = await db.auth.setSession({
      access_token:  exchangeResult.access_token,
      refresh_token: exchangeResult.refresh_token,
    });

    if (sessionError) {
      console.error('[OTP] Échec setSession:', sessionError.message);
      showOTPError(2, 'Erreur de session. Contactez l\'administration.');
      btn.disabled = false; btn.textContent = '✅ Confirmer le code';
      return;
    }

    console.log('[OTP] ✅ Session Supabase initialisée via exchange:', exchangeResult.user?.id);
    clearInterval(otpTimer);
    await connecterEtudiant(otpEtudiantTrouve);

  } catch(e) {
    console.error('[OTP] Erreur inattendue:', e);
    showOTPError(2, 'Erreur de connexion. Réessayez.');
    btn.disabled = false; btn.textContent = '✅ Confirmer le code';

}

function lancerCompteur() {
  // OTP-TIMER-UI (2026-05-18) : calcul depuis otpExpiresAt (timestamp absolu)
  // → synchronisé avec l'expiration réelle serveur, résistant au drift setInterval
  // → si retour arrière / re-appel, le temps restant est correct (pas de reset à 5:00)
  clearInterval(otpTimer);
  otpTimer = setInterval(() => {
    const secs = Math.max(0, Math.round((otpExpiresAt - Date.now()) / 1000));
    const m = Math.floor(secs / 60), s = secs % 60;
    const el = document.getElementById('otp-countdown');
    if (el) {
      el.textContent = m + ':' + String(s).padStart(2, '0');
      // Passer en rouge dans les 60 dernières secondes
      el.style.color = secs <= 60 ? '#dc2626' : '';
    }
    if (secs <= 0) {
      clearInterval(otpTimer);
      if (el) { el.textContent = 'Expiré'; el.style.color = '#dc2626'; }
    }
  }, 1000);
}

async function chargerEnseignantsPortail() {
  if (!currentEcoleId) { tousEnseignantsPortail = []; return; }

  // Charger tous les enseignants de l'école.
  // On ne filtre PAS strictement sur statut='actif' car certains enseignants
  // peuvent avoir statut=null (import sans valeur ou ancien schéma) — ce qui
  // ferait remonter 0 enseignant sans raison visible. On filtre côté JS pour
  // exclure uniquement ceux qui sont explicitement marqués 'inactif'/'suspendu'.
  const { data: tous, error } = await db.from('enseignants').select('*')
    .eq('ecole_id', currentEcoleId).order('nom');
  if (error) { console.warn('[Portail Enseignants] erreur:', error.message); tousEnseignantsPortail = []; return; }
  const liste = (tous || []).filter(e => !e.statut || (e.statut !== 'inactif' && e.statut !== 'suspendu'));

  // Filtrer aux enseignants qui interviennent dans la classe de l'étudiant
  // (via la table programmes : classe_id → enseignant_id)
  // Fallback école entière si :
  //   - pas de classe_id sur l'étudiant
  //   - aucun programme défini pour la classe
  //   - aucun enseignant_id renseigné dans les programmes
  //   - tous les enseignant_id du programme sont introuvables (données incohérentes)
  const classeId = currentEtudiant?.classe_id;
  if (!classeId) { tousEnseignantsPortail = liste; return; }

  // Table 'programmes' non encore créée — fallback liste école entière
  tousEnseignantsPortail = liste; return;
}

function getJsPDFPortail() {
  if (typeof window !== 'undefined' && window.jspdf) return window.jspdf.jsPDF;
  if (typeof jspdf !== 'undefined') return jspdf.jsPDF;
  return null;
}

function pdfSafePortail(str) {
  if (!str) return '';
  return str
    .replace(/é|è|ê|ë/g, 'e')
    .replace(/à|â|ä/g, 'a')
    .replace(/î|ï/g, 'i')
    .replace(/ô|ö/g, 'o')
    .replace(/ù|û|ü/g, 'u')
    .replace(/ç/g, 'c')
    .replace(/É|È|Ê|Ë/g, 'E')
    .replace(/À|Â|Ä/g, 'A')
    .replace(/Î|Ï/g, 'I')
    .replace(/Ô|Ö/g, 'O')
    .replace(/Ù|Û|Ü/g, 'U')
    .replace(/Ç/g, 'C')
    .replace(/[-￿]/g, '');
}

function labelPeriodePDF(p) {
  if (!p) return 'Toutes periodes';
  if (p === 'S1') return 'Semestre 1';
  if (p === 'S2') return 'Semestre 2';
  if (p === 'T1') return 'Trimestre 1';
  if (p === 'T2') return 'Trimestre 2';
  if (p === 'T3') return 'Trimestre 3';
  if (p.startsWith('EXAM-')) return 'Examen';
  return p;
}

async function telechargerBulletinPDFPortail(periode) {
  const JsPDF = getJsPDFPortail();
  if (!JsPDF) { showToast('jsPDF non chargé — réessayez', 'error'); return; }
  if (!currentEtudiant) { showToast('Aucun étudiant lié', 'error'); return; }

  showToast('Génération du PDF...', 'info');

  const notes = periode ? toutesNotes.filter(n => n.periode === periode) : toutesNotes;
  if (!notes.length) { showToast('Aucune note pour cette période', 'error'); return; }

  // ─── BULLETIN-V2 : enrichissement données ───
  // Absences sur la période
  const periodeRanges = {
    S1:['2025-09-01','2026-01-31'], S2:['2026-02-01','2026-06-30'],
    T1:['2025-09-01','2025-12-15'], T2:['2025-12-16','2026-03-31'], T3:['2026-04-01','2026-06-30']
  };
  const range = periodeRanges[periode] || ['2000-01-01','2099-12-31'];
  const { data: absAll } = await db.rpc('fn_get_absences_portail', { p_etudiant_id: currentEtudiant.id });
  const abs = (absAll || []).filter(a => a.date_absence >= range[0] && a.date_absence <= range[1]);
  const stats = { absent:0, retard:0, excuse:0 };
  (abs||[]).forEach(a => { stats[a.statut] = (stats[a.statut]||0) + 1; });

  // Rang
  let rang = '-';
  if (currentEtudiant?.filiere && currentEtudiant?.niveau && currentEtudiant?.ecole_id) {
    const { data: classmates } = await db.from('etudiants')
      .select('id')
      .eq('ecole_id', currentEtudiant.ecole_id)
      .eq('filiere', currentEtudiant.filiere)
      .eq('niveau', currentEtudiant.niveau);
    if (classmates?.length) {
      const ids = classmates.map(c => c.id);
      const { data: allNotes } = await db.from('notes_lmd')
        .select('etudiant_id,valeur')
        .in('etudiant_id', ids);
      const moyParEtu = {};
      (allNotes||[]).forEach(n => {
        if (!moyParEtu[n.etudiant_id]) moyParEtu[n.etudiant_id] = { pts:0, coef:0 };
        moyParEtu[n.etudiant_id].pts += (n.valeur||0);
        moyParEtu[n.etudiant_id].coef += 1;
      });
      const classements = Object.entries(moyParEtu)
        .map(([id,v]) => ({ id, moy: v.coef ? v.pts/v.coef : 0 }))
        .sort((a,b) => b.moy - a.moy);
      const idx = classements.findIndex(c => c.id === currentEtudiant.id);
      const n  = ids.length;
      if (idx === 0) rang = '1er/' + n;
      else if (idx > 0) rang = (idx + 1) + 'e/' + n;
    }
  }

  // Calculs
  let totalPts = 0, totalCoeff = 0;
  notes.forEach(n => { totalPts += n.note*(n.coefficient||1); totalCoeff += (n.coefficient||1); });
  const moy = totalCoeff > 0 ? totalPts/totalCoeff : 0;

  // Regroupement par matière pour sous-totaux
  const parMatiere = {};
  notes.forEach(n => {
    if (!parMatiere[n.matiere]) parMatiere[n.matiere] = { notes:[], pts:0, coef:0 };
    parMatiere[n.matiere].notes.push(n);
    parMatiere[n.matiere].pts += n.note * (n.coefficient||1);
    parMatiere[n.matiere].coef += (n.coefficient||1);
  });

  // Palette teal portail
  const NAVY  = [15, 110, 86];    // teal portail
  const NAVY2 = [30, 58, 95];
  const LIGHT = [225, 245, 238];
  const GREEN = [5, 150, 105];
  const RED   = [220, 38, 38];
  const AMBER = [217, 119, 6];
  const GRAY  = [107, 114, 128];

  function mentionColor(note) { return note>=14?GREEN:note>=10?AMBER:RED; }
  function mentionLabel(note) {
    if (note>=16) return 'Tres bien';
    if (note>=14) return 'Bien';
    if (note>=12) return 'Assez bien';
    if (note>=10) return 'Passable';
    return 'Insuffisant';
  }

  const doc = new JsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const pw = doc.internal.pageSize.getWidth();

  // Entête teal
  doc.setFillColor(...NAVY);
  doc.rect(0, 0, pw, 38, 'F');
  doc.setFillColor(...NAVY2);
  doc.rect(0, 38, pw, 3, 'F');

  doc.setTextColor(255,255,255);
  doc.setFontSize(17); doc.setFont('helvetica','bold');
  doc.text('EduLink', 14, 15);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Portail Famille - Bulletin de notes', 14, 23);
  doc.setTextColor(200,200,200); doc.setFontSize(8);
  doc.text('Edite le '+new Date().toLocaleDateString('fr-FR'), 14, 30);

  doc.setTextColor(255,255,255);
  doc.setFontSize(12); doc.setFont('helvetica','bold');
  doc.text('BULLETIN DE NOTES', pw-14, 15, { align:'right' });
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Periode : '+labelPeriodePDF(periode||''), pw-14, 23, { align:'right' });

  let y = 48;

  // Bloc étudiant — agrandi pour accueillir période et rang
  doc.setFillColor(...LIGHT);
  doc.roundedRect(14, y, pw-28, 36, 3, 3, 'F');
  doc.setDrawColor(...NAVY); doc.setLineWidth(0.4);
  doc.roundedRect(14, y, pw-28, 36, 3, 3, 'S');

function renderNotifsListe() {
  const el = document.getElementById('pn-liste');
  if (!el) return;

  // Helper de détection (partagé avec le rendu) — extrait la catégorie métier
  // depuis le titre/corps quand type est une sévérité (warning/info/...)
  const _SEVERITES = ['warning','info','success','error','alert','urgent'];
  const _detecterCat = (n) => {
    const txt = ((n.titre || '') + ' ' + (n.corps || '')).toLowerCase();
    if (/absen/i.test(txt))                        return 'absence';
    if (/\bnote\b|moyenne|bulletin/i.test(txt))    return 'note';
    if (/examen|composition|interrog/i.test(txt))  return 'examen';
    if (/paiement|facture|scolarit[eé]|frais/i.test(txt)) return 'paiement';
    if (/annonce|communiqué/i.test(txt))           return 'annonce';
    if (/message|courrier/i.test(txt))             return 'message';
    return null;
  };
  const _categorieDe = (n) => {
    const t = n.type || '';
    return _SEVERITES.includes(t) ? (_detecterCat(n) || t) : t;
  };

  const liste = notifsFiltreActif === 'tous'
    ? toutesNotifsPortail
    : toutesNotifsPortail.filter(n => _categorieDe(n) === notifsFiltreActif);

  if (!liste.length) {
    el.innerHTML = `<div class="pn-empty"><div class="pn-ico">🔔</div><p>Aucune alerte${notifsFiltreActif !== 'tous' ? ' dans cette catégorie' : ''}.</p></div>`;
    return;
  }

  const ICONES   = {
    annonce:'📢', absence:'🚫', note:'📊', examen:'📝', paiement:'💳',
    message:'✉️', systeme:'🔔',
    // Sévérités (fallback si la BD utilise warning/info/success/error comme type)
    warning:'⚠️', info:'ℹ️', success:'✅', error:'⛔', alert:'⚠️', urgent:'🚨'
  };
  const COULEURS = {
    annonce:'blue', absence:'red', note:'teal', examen:'purple', paiement:'amber',
    message:'green', systeme:'blue',
    warning:'amber', info:'blue', success:'green', error:'red', alert:'amber', urgent:'red'
  };
  const TYPE_LBL = {
    annonce:'Annonce', absence:'Absence', note:'Note', examen:'Examen', paiement:'Paiement',
    message:'Message', systeme:'Système',
    warning:'Alerte', info:'Info', success:'Succès', error:'Erreur', alert:'Alerte', urgent:'Urgent'
  };

  el.innerHTML = liste.map(n => {
    const typeBrut    = n.type || '';
    const categorie   = _categorieDe(n);
    const ico         = ICONES[categorie]   || ICONES[typeBrut]   || '🔔';
    const couleur     = COULEURS[categorie] || COULEURS[typeBrut] || 'blue';
    const lbl         = TYPE_LBL[categorie] || TYPE_LBL[typeBrut] || (typeBrut ? typeBrut.charAt(0).toUpperCase()+typeBrut.slice(1) : '—');
    const urgent      = n.priorite === 'high' || typeBrut === 'urgent';
    return `
    <div class="pn-item ${!n.lu ? 'unread' : ''} ${urgent ? 'high' : ''}"
         onclick="marquerLuePortail('${n.id}',this)">
      <div class="pn-ico-wrap ${couleur}">${ico}</div>
      <div class="pn-body">
        <div class="pn-titre">${n.titre || '—'}</div>
        <div class="pn-corps">${n.corps || ''}</div>
        <div class="pn-meta">
          <span class="pn-type-pill badge ${couleur}">${lbl}</span>
          ${urgent ? '<span class="pn-type-pill badge red">URGENT</span>' : ''}
          <span>${fmtDateRelative(n.created_at)}</span>
        </div>
      </div>
      ${!n.lu ? '<div class="pn-dot"></div>' : ''}
    </div>`;
  }).join('');
}

function filtrerNotifsPortail(type, btn) {
  notifsFiltreActif = type;
  document.querySelectorAll('.pn-filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderNotifsListe();
}

// ── Marquer une notification comme lue ───────────────────────────────
async function marquerLuePortail(id, el) {
  if (!id) return;
  const notif = toutesNotifsPortail.find(n => n.id === id);
  if (!notif || notif.lu) return;
  notif.lu = true;
  notif.lu_at = new Date().toISOString();
  // Mettre à jour visuellement
  el.classList.remove('unread');
  el.classList.remove('high');
  const dot = el.querySelector('.pn-dot');
  if (dot) dot.remove();
  // Mettre à jour badge nav
  const nonLues = toutesNotifsPortail.filter(n => !n.lu).length;
  const badge = document.getElementById('nav-notifs-badge');
  if (badge) { badge.style.display = nonLues > 0 ? 'flex' : 'none'; badge.textContent = nonLues; }
  // Persister en base
  try {
    await db.from('notifications').update({ lu: true, lu_at: new Date().toISOString() }).eq('id', id);
  } catch(_) {}
  // Naviguer si lien
  if (notif.lien) showPage(notif.lien.replace('/','').replace('.html',''));
}

// ── Date relative lisible ─────────────────────────────────────────────
function fmtDateRelative(d) {
  if (!d) return '—';
  const now  = Date.now();
  const diff = now - new Date(d).getTime();
  const mn   = Math.floor(diff / 60000);
  const h    = Math.floor(diff / 3600000);
  const j    = Math.floor(diff / 86400000);
  if (mn < 2)  return 'À le moment';
  if (mn < 60) return `Il y a ${mn} min`;
  if (h < 24)  return `Il y a ${h}h`;
  if (j === 1) return 'Hier';
  if (j < 7)   return `Il y a ${j} jours`;
  return new Date(d).toLocaleDateString('fr-FR', {day:'2-digit',month:'short'});
}

let edtPortailData = [];
const JOURS_EDT = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const HEURES_EDT = ['07:00','08:00','09:00','10:00','11:00','12:00',
                    '13:00','14:00','15:00','16:00','17:00'];

async function chargerEmploiPortail() {
  if (!currentEcoleId) { edtPortailData = []; return; }
  try {
    // Charger tous les créneaux de l'école
    const { data } = await db.from('emploi_du_temps')
      .select('*')
      .eq('ecole_id', currentEcoleId)
      .order('jour')
      .order('heure_debut');
    const tous = data || [];

    // Filtrer par classe de l'étudiant si on la connaît
    // - matching exact sur le nom textuel (BO sauve `c.nom || c.filiere+' '+c.niveau`)
    // - les créneaux sans classe (transversaux) sont conservés
    // - fallback : si rien ne match, on retombe sur tous les créneaux école
    //   (évite l'EDT vide sur une donnée mal seedée)
    const classe = currentEtudiant?.classe_nom;
    if (classe) {
      const filtre = tous.filter(c => !c.classe || c.classe === classe);
      edtPortailData = filtre.length ? filtre : tous;
    } else {
      edtPortailData = tous;
    }
  } catch(e) {
    edtPortailData = [];
    console.warn('[Emploi]', e.message);
  }
}

// ══ B2.6 CACHE LOCAL PWA ══
const CACHE_KEYS = {
  notes:    'edulink_cache_notes',
  factures: 'edulink_cache_factures',
  examens:  'edulink_cache_examens',
  messages: 'edulink_cache_messages',
  releves:  'edulink_cache_releves',
  sync:     'edulink_cache_last_sync',
};

function cacheSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
}

function cacheGet(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    // Expiration : 24h
    if (Date.now() - obj.ts > 86400000) { localStorage.removeItem(key); return null; }
    return obj.data;
  } catch(e) { return null; }
}

function cacheSaveAll() {
  if (toutesNotes    && toutesNotes.length)    cacheSet(CACHE_KEYS.notes,    toutesNotes);
  if (toutesFactures && toutesFactures.length) cacheSet(CACHE_KEYS.factures, toutesFactures);
  if (tousExamens    && tousExamens.length)    cacheSet(CACHE_KEYS.examens,  tousExamens);
  if (tousMessages   && tousMessages.length)   cacheSet(CACHE_KEYS.messages, tousMessages.slice(0, 50));
  if (tousReleves    && tousReleves.length)     cacheSet(CACHE_KEYS.releves,  tousReleves);
  localStorage.setItem(CACHE_KEYS.sync, new Date().toISOString());
  console.log('[EduLink Cache] Données sauvegardées localement');
}

function cacheLoadAll() {
  const notes    = cacheGet(CACHE_KEYS.notes);
  const factures = cacheGet(CACHE_KEYS.factures);
  const examens  = cacheGet(CACHE_KEYS.examens);
  const messages = cacheGet(CACHE_KEYS.messages);
  const releves  = cacheGet(CACHE_KEYS.releves);
  if (notes)    toutesNotes    = notes;
  if (factures) toutesFactures = factures;
  if (examens)  tousExamens    = examens;
  if (messages) tousMessages   = messages;
  if (releves)  tousReleves    = releves;
  const loaded = [notes, factures, examens, messages, releves].filter(Boolean).length;
  if (loaded > 0) console.log('[EduLink Cache] ' + loaded + ' jeux de données chargés depuis le cache local');
  return loaded > 0;
}

function getSyncLabel() {
  const iso = localStorage.getItem(CACHE_KEYS.sync);
  if (!iso) return null;
  const d = new Date(iso);
  const now = new Date();
  const diffMin = Math.floor((now - d) / 60000);
  if (diffMin < 1) return 'Sync à l\'instant';
  if (diffMin < 60) return 'Sync il y a ' + diffMin + ' min';
  return 'Sync ' + d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
}

// File d'attente messages hors-ligne
const MSG_QUEUE_KEY = 'edulink_msg_queue';

function mqEnqueue(msg) {
  try {
    const q = JSON.parse(localStorage.getItem(MSG_QUEUE_KEY) || '[]');
    q.push({ ...msg, queued_at: new Date().toISOString() });
    localStorage.setItem(MSG_QUEUE_KEY, JSON.stringify(q));
    console.log('[EduLink Cache] Message mis en file d\'attente hors-ligne');
  } catch(e) {}
}

function mqFlush() {
  try {
    const q = JSON.parse(localStorage.getItem(MSG_QUEUE_KEY) || '[]');
    if (!q.length) return;
    console.log('[EduLink Cache] Envoi de ' + q.length + ' message(s) en attente...');
    // Les messages seront envoyés par afficherMessages() au prochain chargement
    localStorage.removeItem(MSG_QUEUE_KEY);
  } catch(e) {}
}

// Appeler mqFlush au retour en ligne
window.addEventListener('online', function() {
  console.log('[EduLink] Connexion rétablie');
  mqFlush();
  // Rafraîchir les données si une session est active
  if (currentEtudiant) {
    chargerToutesDonnees(currentEtudiant.id).then(cacheSaveAll);
  }
});

  page.innerHTML = `<div class="page-pad">

      <div style="position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:48px;opacity:.12">📜</div>

      <div style="font-size:14px;font-weight:700;margin-bottom:4px">Document${certPortailList.length>1?'s':''} officiel${certPortailList.length>1?'s':''}</div>
      <div style="margin-top:6px">${summaryBadges}</div>
    </div>
    <div class="card" style="overflow:hidden">
      ${certPortailList.map(c => {
        const t = CERT_TYPES_PORTAIL[c.type] || { label:c.type, ico:'📄', cls:'blue' };

          <div class="cpc-ico" style="background:${c.type==='releve_notes'?'#fef9c3':c.type==='diplome_provisoire'?'#ede9fe':c.type==='certificat_scolarite'?'#dcfce7':'#dbeafe'}">${t.ico}</div>
          <div class="cpc-info">
            <div class="cpc-type">${t.label}</div>
            <div><span class="cpc-ref">${c.reference}</span></div>
            <div class="cpc-date">Émis le ${fmtDate(c.created_at)}${c.delivre_par?' · '+c.delivre_par:''}</div>
          </div>
          <button class="cpc-dl" onclick="telechargerCertPortailV2('${c.id}')">⬇ PDF</button>
        </div>`;
      }).join('')}
    </div>
    <div style="text-align:center;padding:1rem;font-size:12px;color:#9ca3af">
      🔒 Tous vos documents sont vérifiables sur <strong>edulink.bj/verifier</strong>
    </div>

}

async function telechargerCertPortailV2(id) {
  const cert = certPortailList.find(c => c.id === id);
  if (!cert) { showToast('Document introuvable.', 'error'); return; }
  showToast('⏳ Génération du PDF...', 'info');
  try {
    const JsPDF = window.jspdf?.jsPDF;
    if (!JsPDF) { showToast('jsPDF non disponible', 'error'); return; }

    let ecole = null;
    try {
      const { data: ecoleData } = await db.from('ecoles')
        .select('nom,type,couleur_primaire,couleur_secondaire,couleur_accent,slogan')
        .eq('id', currentEcoleId).single();
      ecole = ecoleData;
    } catch(_) {}

    const pHex = h => h ? [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)] : null;
    const prim = pHex(ecole?.couleur_primaire) || [30,58,95];
    const acc  = pHex(ecole?.couleur_accent)   || [201,124,26];
    const nomEcole = ecole?.nom || 'Établissement';
    const safe = s => (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\x00-\x7E]/g,'');

    const doc = new JsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const pw = doc.internal.pageSize.getWidth();
    const ph = doc.internal.pageSize.getHeight();

    // Header
    doc.setFillColor(...prim); doc.rect(0,0,pw,36,'F');
    doc.setFillColor(...acc);  doc.rect(0,31,pw,5,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(14); doc.setFont('helvetica','bold');
    doc.text(safe(nomEcole), 14, 16);
    doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text(safe(ecole?.type||'') + '  ·  République du Bénin', 14, 24);
    doc.setFontSize(7); doc.setFont('helvetica','italic');
    doc.text(safe(ecole?.slogan||'Excellence · Intégrité · Innovation'), 14, 30);
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text('Annee academique ' + (new Date().getMonth()>=8 ? new Date().getFullYear()+'/'+(new Date().getFullYear()+1) : (new Date().getFullYear()-1)+'/'+new Date().getFullYear()), pw/2, 34.5, {align:'center'});

    let y = 46;
    const tc = CERT_TYPES_PORTAIL[cert.type] || {label:cert.type};
    doc.setTextColor(...prim); doc.setFontSize(16); doc.setFont('helvetica','bold');
    doc.text(safe(tc.label.toUpperCase()), pw/2, y, {align:'center'});
    y += 13;

    doc.setFillColor(239,246,255);
    doc.roundedRect(14, y, pw-28, 9, 2, 2, 'F');
    doc.setTextColor(30,58,95); doc.setFontSize(7.5); doc.setFont('courier','bold');
    doc.text('Ref : ' + cert.reference, 18, y+5.5);
    doc.setFont('helvetica','normal'); doc.setTextColor(107,114,128);
    doc.text('Le ' + new Date().toLocaleDateString('fr-FR'), pw-18, y+5.5, {align:'right'});
    y += 16;

    // Etudiant
    doc.setFillColor(249,250,251);
    doc.roundedRect(14, y, pw-28, 22, 2, 2, 'F');
    doc.setTextColor(30,58,95); doc.setFontSize(12); doc.setFont('helvetica','bold');
    doc.text(safe((currentEtudiant?.prenom||'')+' '+(currentEtudiant?.nom||'')), 22, y+9);
    doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(107,114,128);
    doc.text('Matricule : '+safe(currentEtudiant?.matricule||'—'), 22, y+15);
    doc.text(safe(currentEtudiant?.filiere||'—')+' — '+safe(currentEtudiant?.niveau||'—'), 22, y+20);
    y += 29;

    // Corps
    const corps = "Ce document certifie que " + safe((currentEtudiant?.prenom||"")+" "+(currentEtudiant?.nom||"")) +
      " est regulierement inscrit(e) a " + safe(nomEcole) +
      " pour l'annee academique en cours, en " + safe(currentEtudiant?.filiere||"-") +
      ", niveau " + safe(currentEtudiant?.niveau||"-") + ".\n\n" +
      "Ce document est delivre a la demande de l'interesse(e) et porte la reference " + cert.reference + ".";
    doc.setTextColor(55,65,81); doc.setFontSize(10); doc.setFont('helvetica','normal');
    const lines = doc.splitTextToSize(corps, pw-28);
    doc.text(lines, 14, y); y += lines.length*5.5 + 14;

    // Signature
    doc.setDrawColor(229,231,235); doc.setLineWidth(0.3);
    doc.line(14, y, pw-14, y); y += 8;
    doc.setTextColor(107,114,128); doc.setFontSize(7.5); doc.setFont('helvetica','normal');
    doc.text('Fait a Cotonou, le ' + new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}), 14, y);
    y += 10;
    doc.setDrawColor(209,213,219); doc.setLineWidth(0.3);
    doc.rect(14, y, 68, 22, 'D');
    doc.setFillColor(249,250,251); doc.rect(14, y, 68, 7, 'F');
    doc.setTextColor(30,58,95); doc.setFontSize(7.5); doc.setFont('helvetica','bold');
    doc.text('Le Signataire', 48, y+5, {align:'center'});
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(107,114,128);
    doc.text(safe(cert.delivre_par||'La Direction'), 48, y+14, {align:'center'});

    // Footer
    doc.setFillColor(...prim); doc.rect(0, ph-10, pw, 10, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(safe(nomEcole) + '  ·  Document officiel  ·  edulink.bj/verifier/' + cert.reference, pw/2, ph-4, {align:'center'});

    doc.save(safe(tc.label.replace(/\s+/g,'_')) + '_' + cert.reference + '.pdf');
    showToast('📥 Document téléchargé !', 'success');
  } catch(err) {
    showToast('Erreur PDF : ' + err.message, 'error');
  }
}

// ══ BRANDING DYNAMIQUE  ★ JOUR 17 ═══════════════════════════════════

async function chargerBrandingPortail() {
  if (!currentEcoleId) return;
  try {
    // ⚠ couleur_bg n'existe pas dans le schéma actuel — ne PAS la sélectionner
    //    (un select sur une colonne inexistante => 400 sur toute la requête)
    const { data, error } = await db.from('ecoles')
      .select('nom, couleur_primaire, couleur_secondaire, couleur_accent, logo_url')
      .eq('id', currentEcoleId).maybeSingle();
    if (error) { console.warn('[Branding Portail] Supabase:', error.message || error); return; }
    if (!data)  { console.warn('[Branding Portail] Aucune école pour id=', currentEcoleId); return; }

    const p  = data.couleur_primaire   || '#0f6e56';
    const s  = data.couleur_secondaire || '#1e3a5f';
    const a  = data.couleur_accent     || '#c97c1a';
    const bg = '#f0f7f4'; // couleur_bg absente du schéma — fallback en dur

    // Injecter les CSS variables dans :root
    const root = document.documentElement;
    root.style.setProperty('--teal',       p);
    root.style.setProperty('--navy',       s);
    root.style.setProperty('--gold',       a);
    root.style.setProperty('--bg',         bg);
    root.style.setProperty('--teal-light', p + '22');

    // Mettre à jour le thème PWA
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', p);

    // Mettre à jour le titre de l'onglet (toujours, même sans slogan)
    if (data.nom) {
      document.title = data.nom + ' — Portail Famille';
      // Stocker pour usage dans les PDFs
      window.currentEcoleNom = data.nom;
    }

    // Mettre à jour le header : nom de l'école toujours, logo en plus si dispo
    const logoEl = document.querySelector('.header-logo');
    if (logoEl && data.nom) {
      const nomSafe = String(data.nom).replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const logoSrc = data.logo_url ? String(data.logo_url).replace(/"/g, '&quot;') : null;
      const visuel  = logoSrc
        ? `<img src="${logoSrc}" style="height:28px;width:auto;object-fit:contain;border-radius:6px" onerror="this.style.display='none'">`
        : '🎓';
      logoEl.innerHTML = `${visuel} <span style="font-size:14px;font-weight:700;letter-spacing:.2px">${nomSafe}</span>`;
    }

    console.log('[Branding] Thème appliqué :', p, s, a);
  } catch(e) {
    console.warn('[Branding Portail]', e.message);
  }
}

// ══ MODE HORS-LIGNE PORTAIL  ★ JOUR 17 ══════════════════════════════

function initOfflineModePortail() {
  const banner = document.getElementById('offline-banner');
  function updateStatus() {
    if (banner) banner.style.display = navigator.onLine ? 'none' : 'block';
  }
  window.addEventListener('online',  () => { updateStatus(); showToast('🌐 Connexion rétablie', 'success'); });
  window.addEventListener('offline', () => { updateStatus(); showToast('📡 Mode hors-ligne activé', 'info'); });
  updateStatus();

  // Enregistrer SW et écouter les messages
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('[SW Portail] Enregistré'))
      .catch(e  => console.warn('[SW Portail]', e.message));

    navigator.serviceWorker.addEventListener('message', (event) => {
      if (event.data?.type === 'EDULINK_SYNC_DONE') {
        showToast('🔄 Données synchronisées', 'success');
        chargerTout(); // Recharger les données
      }
    });
  }
}

// ══ REALTIME — Mises à jour en temps réel ═══════════════════
let realtimeChannel = null;

function initRealtime() {
  if (realtimeChannel) return; // Déjà abonné
  if (!currentEcoleId) return;

  realtimeChannel = db.channel('portail-realtime-' + currentEcoleId)

    // Nouveau message du back-office
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: 'ecole_id=eq.' + currentEcoleId
    }, payload => {
      console.log('[Realtime] Nouveau message:', payload.new);
      chargerMessages();
      // Afficher une alerte discrète
      const nom = payload.new?.expediteur_nom || 'Administration';
      showToastPortail('✉️ Nouveau message de ' + nom, 'info');
    })

    // Nouvelle note ajoutée
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'notes',
      filter: 'etudiant_id=eq.' + (currentEtudiant?.id || 'none')
    }, payload => {
      console.log('[Realtime] Nouvelle note:', payload.new);
      chargerNotes();
      showToastPortail('📊 Nouvelle note enregistrée : ' + payload.new?.matiere, 'success');
    })

    // Nouvelle absence
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'absences',
      filter: 'etudiant_id=eq.' + (currentEtudiant?.id || 'none')
    }, payload => {
      console.log('[Realtime] Nouvelle absence:', payload.new);
      chargerAbsences();
      showToastPortail('🚫 Absence enregistrée : ' + payload.new?.matiere, 'warning');
    })

    .subscribe(status => {
      console.log('[Realtime] Statut:', status);
    });
}

function showToastPortail(msg, type='info') {
  const colors = { info:'#1e3a5f', success:'#059669', warning:'#d97706', error:'#dc2626' };
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    background:${colors[type]||colors.info};color:#fff;padding:10px 18px;border-radius:12px;
    font-size:13px;font-family:'Poppins',sans-serif;font-weight:600;z-index:9999;
    box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:320px;text-align:center;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
