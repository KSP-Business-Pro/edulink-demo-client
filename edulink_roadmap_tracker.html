<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.tracker{padding:1rem 0}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.hdr-left h1{font-size:17px;font-weight:500;margin-bottom:2px}
.hdr-left p{font-size:12px;color:var(--color-text-secondary)}
.global-bar{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:12px 16px;display:flex;align-items:center;gap:12px;min-width:220px}
.global-bar span{font-size:13px;color:var(--color-text-secondary);white-space:nowrap}
.bar-wrap{flex:1;height:8px;background:var(--color-border-tertiary);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#1e3a5f;transition:width .4s}
.pct{font-size:14px;font-weight:500;white-space:nowrap}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.fbtn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);transition:all .15s}
.fbtn.active,.fbtn:hover{background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.sprint{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:12px;overflow:hidden}
.sprint-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:var(--color-background-secondary);user-select:none}
.sprint-hdr:hover{background:var(--color-background-primary)}
.sprint-num{width:26px;height:26px;border-radius:50%;background:#1e3a5f;color:#fff;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sprint-title{flex:1;font-size:13px;font-weight:500}
.sprint-meta{display:flex;align-items:center;gap:8px}
.mini-bar{width:80px;height:5px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden}
.mini-fill{height:100%;border-radius:3px;background:#f97316}
.sprint-pct{font-size:11px;color:var(--color-text-secondary);min-width:30px;text-align:right}
.chev{font-size:14px;color:var(--color-text-secondary);transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.tasks{padding:8px 14px 10px}
.task{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.task:last-child{border-bottom:none}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.b-done{background:#d1fae5;color:#065f46}
.b-partial{background:#fef3c7;color:#92400e}
.b-todo{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.b-blocked{background:#fee2e2;color:#991b1b}
.task-main{flex:1;min-width:0}
.task-title{font-size:12.5px;line-height:1.4}
.task-note{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.pri{font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.pri-h{background:#fee2e2;color:#991b1b}
.pri-c{background:#dbeafe;color:#1e40af}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
</style>
<div class="tracker">
<h2 class="sr-only">Fiche de suivi de développement EduLink Sup</h2>
<div class="hdr">
  <div class="hdr-left">
    <h1>EduLink Sup — Fiche de suivi</h1>
    <p>Feuille de route LMD-CAMES · mise à jour 10 juin 2026 — S6 100% complet, SMS OTP + FCM opérationnels</p>
  </div>
  <div class="global-bar">
    <span>Avancement global</span>
    <div class="bar-wrap"><div class="bar-fill" id="global-fill"></div></div>
    <span class="pct" id="global-pct">—</span>
  </div>
</div>

<div class="legend">
  <span class="leg-item"><span class="badge b-done">Fait</span> terminé</span>
  <span class="leg-item"><span class="badge b-partial">Partiel</span> en cours / partiel</span>
  <span class="leg-item"><span class="badge b-todo">À faire</span> non démarré</span>
  <span class="leg-item"><span class="badge b-blocked">Bloqué</span> bloqué</span>
  <span class="leg-item"><span class="pri pri-h">●</span> priorité haute</span>
  <span class="leg-item"><span class="pri pri-c">●</span> critique</span>
</div>

<div class="filters">
  <button class="fbtn active" onclick="filter('all',this)">Tout</button>
  <button class="fbtn" onclick="filter('done',this)">Fait</button>
  <button class="fbtn" onclick="filter('partial',this)">Partiel</button>
  <button class="fbtn" onclick="filter('todo',this)">À faire</button>
</div>

<div id="sprints"></div>
</div>

let currentFilter='all';
const pts={done:1,partial:0.5,todo:0,blocked:0};

function render(){
  const c=document.getElementById('sprints');
  c.innerHTML='';
  let totalScore=0,totalTasks=0;
  D.forEach(sp=>{
    totalScore+=sp.tasks.reduce((a,t)=>a+pts[t.s],0);
    totalTasks+=sp.tasks.length;
    const tasks=currentFilter==='all'?sp.tasks:sp.tasks.filter(t=>t.s===currentFilter);
    if(currentFilter!=='all'&&!tasks.length)return;
    const pct=Math.round(sp.tasks.reduce((a,t)=>a+pts[t.s],0)/sp.tasks.length*100);
    const div=document.createElement('div');
    div.className='sprint';
    const hdr=document.createElement('div');
    hdr.className='sprint-hdr';
    hdr.innerHTML=`<div class="sprint-num">${sp.label}</div><div class="sprint-title">${sp.title}</div><div class="sprint-meta"><div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div><span class="sprint-pct">${pct}%</span></div><i class="ti ti-chevron-down chev" aria-hidden="true"></i>`;
    div.appendChild(hdr);
    const body=document.createElement('div');
    body.className='tasks';body.style.display='none';
    tasks.forEach(t=>{
      const row=document.createElement('div');row.className='task';
      const bclass={done:'b-done',partial:'b-partial',todo:'b-todo',blocked:'b-blocked'}[t.s];
      const blabel={done:'Fait',partial:'Partiel',todo:'À faire',blocked:'Bloqué'}[t.s];
      const pri=t.p==='c'?`<span class="pri pri-c">critique</span>`:t.p==='h'?`<span class="pri pri-h">haute</span>`:'';
      row.innerHTML=`<span class="badge ${bclass}">${blabel}</span><div class="task-main"><div class="task-title">${t.t}${pri}</div>${t.n?`<div class="task-note">${t.n}</div>`:''}</div>`;
      body.appendChild(row);
    });
    div.appendChild(body);
    hdr.addEventListener('click',()=>{
      const open=body.style.display!=='none';
      body.style.display=open?'none':'block';
      hdr.querySelector('.chev').classList.toggle('open',!open);
    });
    c.appendChild(div);
  });
  const gp=Math.round(totalScore/totalTasks*100);
  document.getElementById('global-fill').style.width=gp+'%';
  document.getElementById('global-pct').textContent=gp+'%';
}

function filter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

render();
document.querySelectorAll('.sprint-hdr')[0]?.click();
</script>
