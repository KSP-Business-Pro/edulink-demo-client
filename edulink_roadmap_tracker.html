<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.tracker{padding:1rem 0}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.hdr-left h1{font-size:17px;font-weight:500;margin-bottom:2px}
.hdr-left p{font-size:12px;color:var(--color-text-secondary)}
.global-bar{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:12px 16px;display:flex;align-items:center;gap:12px;min-width:220px}
.global-bar span{font-size:13px;color:var(--color-text-secondary);white-space:nowrap}
.bar-wrap{flex:1;height:8px;background:var(--color-border-tertiary);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:#1e3a5f;transition:width .4s}
.pct{font-size:14px;font-weight:500;white-space:nowrap}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.fbtn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);transition:all .15s}
.fbtn.active,.fbtn:hover{background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.sprint{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:12px;overflow:hidden}
.sprint-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:var(--color-background-secondary);user-select:none}
.sprint-hdr:hover{background:var(--color-background-primary)}
.sprint-num{width:26px;height:26px;border-radius:50%;background:#1e3a5f;color:#fff;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sprint-title{flex:1;font-size:13px;font-weight:500}
.sprint-meta{display:flex;align-items:center;gap:8px}
.mini-bar{width:80px;height:5px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden}
.mini-fill{height:100%;border-radius:3px;background:#f97316}
.sprint-pct{font-size:11px;color:var(--color-text-secondary);min-width:30px;text-align:right}
.chev{font-size:14px;color:var(--color-text-secondary);transition:transform .2s}
.chev.open{transform:rotate(180deg)}
.tasks{padding:8px 14px 10px}
.task{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.task:last-child{border-bottom:none}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.b-done{background:#d1fae5;color:#065f46}
.b-partial{background:#fef3c7;color:#92400e}
.b-todo{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.b-blocked{background:#fee2e2;color:#991b1b}
.task-main{flex:1;min-width:0}
.task-title{font-size:12.5px;line-height:1.4}
.task-note{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.pri{font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.pri-h{background:#fee2e2;color:#991b1b}
.pri-c{background:#dbeafe;color:#1e40af}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
</style>
<div class="tracker">
<h2 class="sr-only">Fiche de suivi de développement EduLink Sup</h2>
<div class="hdr">
  <div class="hdr-left">
    <h1>EduLink Sup — Fiche de suivi</h1>
    <p>Feuille de route LMD-CAMES · mise à jour 02 juin 2026</p>
  </div>
  <div class="global-bar">
    <span>Avancement global</span>
    <div class="bar-wrap"><div class="bar-fill" id="global-fill"></div></div>
    <span class="pct" id="global-pct">—</span>
  </div>
</div>
<div class="legend">
  <span class="leg-item"><span class="badge b-done">Fait</span> terminé</span>
  <span class="leg-item"><span class="badge b-partial">Partiel</span> en cours / partiel</span>
  <span class="leg-item"><span class="badge b-todo">À faire</span> non démarré</span>
  <span class="leg-item"><span class="badge b-blocked">Bloqué</span> bloqué</span>
  <span class="leg-item"><span class="pri pri-h">●</span> priorité haute</span>
  <span class="leg-item"><span class="pri pri-c">●</span> critique</span>
</div>
<div class="filters">
  <button class="fbtn active" onclick="filter('all',this)">Tout</button>
  <button class="fbtn" onclick="filter('done',this)">Fait</button>
  <button class="fbtn" onclick="filter('partial',this)">Partiel</button>
  <button class="fbtn" onclick="filter('todo',this)">À faire</button>
</div>
<div id="sprints"></div>
</div>
<script>
const D=[

  {t:"Authentification Supabase Auth",s:"done"},
  {t:"Multi-école / multi-tenant (ecole_id)",s:"done"},
  {t:"Dashboard avec donut chart programmes",s:"done"},
  {t:"Affichage Programmes & UE",s:"done"},
  {t:"Modal + Unité d'enseignement",s:"done",n:"CRUD complet + RLS"},
  {t:"RLS back-office (25 tables)",s:"done",n:"Script global appliqué"},
  {t:"Saisie des notes (interface)",s:"partial",n:"Interface présente, verrouillage post-clôture à finaliser"},
  {t:"Calcul résultats (fn_resultats_semestre)",s:"done",n:"Fonction RPC opérationnelle + batch calculer validé sur HEMEC"},
  {t:"Relevés (PDF officiel + QR code)",s:"done",n:"jsPDF + QR code + N° unique — validé le 02/06/2026"},
  {t:"Présences (interface)",s:"partial",n:"Interface présente, seuil exclusion à compléter"},
  {t:"Comptabilité (interface)",s:"partial",n:"Tableaux présents, modaux = stubs"},
  {t:"Portail famille (app séparée)",s:"partial",n:"edulink-portail.html — Firebase + bulletins"},
  {t:"Pitch ESM (web + PowerPoint)",s:"done"},

{id:1,label:"S1",title:"Sprint 1 — Socle technique",tasks:[
  {t:"Migration React + TypeScript + Vite",s:"todo",p:"c",n:"Reporté post-lancement — architecture actuelle fonctionnelle"},
  {t:"Séparation en modules (/auth, /dashboard…)",s:"todo",p:"c"},
  {t:"Couche services/ Supabase centralisée",s:"todo",p:"h"},
  {t:"Fichier .env (no secrets en dur)",s:"todo",p:"h"},
  {t:"Repo structuré /apps /supabase /docs /tests",s:"todo"},
  {t:"Éliminer les doublons de fonctions JS",s:"todo",n:"filtrerEtudiants, filtrerReleves, etc."},
  {t:"Rôles et permissions (7 rôles)",s:"partial",n:"Connexion OK, RLS par rôle à compléter"},
  {t:"Séparation back-office / landing page",s:"done",n:"2 projets Vercel distincts — edulink.bj + app.edulink.bj"},
]},
{id:2,label:"S2",title:"Sprint 2 — Référentiel académique",tasks:[
  {t:"CRUD Programmes (modal complet)",s:"done",n:"Créer / modifier / supprimer opérationnel"},
  {t:"CRUD Unités d'enseignement",s:"done",n:"CRUD complet — 02/06/2026"},
  {t:"CRUD Matières (matieres_lmd)",s:"done",n:"Gestion par UE opérationnelle"},
  {t:"Affectation UE ↔ programme ↔ semestre",s:"done",n:"programme_ue + voirUEProgramme"},
  {t:"Affectation matière ↔ UE",s:"done",n:"ouvrirGestionMatieres opérationnel"},
  {t:"Affectation enseignant ↔ matière",s:"partial",n:"Vue voirMatieresEnseignant présente, CRUD à compléter"},
  {t:"CRUD Semestres + années académiques",s:"done",n:"CRUD Semestres + CRUD Années académiques ajouté le 02/06/2026"},
  {t:"CRUD Promotions",s:"done",n:"Créer / modifier / supprimer opérationnel"},
  {t:"Contrôle crédits (30/sem, 180 Licence…)",s:"todo",p:"h",n:"Affichage dashboard uniquement — validation bloquante à implémenter"},
  {t:"Import Excel/CSV maquette pédagogique",s:"todo"},
]},
{id:3,label:"S3",title:"Sprint 3 — Étudiants et inscriptions",tasks:[
  {t:"Fiche étudiant complète (modal)",s:"partial",n:"modifierEtudiant présent, création complète à valider"},
  {t:"Génération automatique du matricule",s:"done",n:"_genMatricule + _genMatriculeEcole opérationnels"},
  {t:"Inscription annuelle + semestrielle",s:"done",n:"soumettreInscription + ouvrirInscriptionModal opérationnels"},
  {t:"Import Excel/CSV étudiants",s:"done",n:"Import batch + validation SheetJS"},
  {t:"Gestion redoublement / abandon / transfert",s:"partial",n:"toggleStatutInscription présent (active/suspendue/abandonnee/diplomee)"},
  {t:"Historique parcours LMD complet",s:"todo"},
  {t:"Suppression/archivage étudiant",s:"done",n:"supprimerEtudiant opérationnel"},
]},
{id:4,label:"S4",title:"Sprint 4 — Notes et calculs LMD-CAMES",tasks:[
  {t:"Créer évaluations par matière (CC, DS, TP, Exam, Rattrapage)",s:"partial",n:"Sessions_evaluation présentes"},
  {t:"Grille saisie enseignant (verrouillage post-clôture)",s:"partial",n:"Interface présente, verrouillage session à finaliser"},
  {t:"Sauvegarde automatique notes",s:"partial"},
  {t:"Journalisation modifications (notes_historique)",s:"todo",p:"h"},
  {t:"Gestion absences aux évaluations",s:"todo"},
  {t:"fn_resultats_semestre (SQL, tests)",s:"partial",p:"c",n:"Fonction opérationnelle — tests unitaires manquants"},
  {t:"fn_resultats_annuels + compensation",s:"done",p:"c",n:"fn_resultats_annuels SQL + calcul JS + compensation CAMES — 02/06/2026"},
  {t:"Résultats annuels LMD (onglet Annuel)",s:"done",n:"Onglet Annuel LMD dans Résultats — 29 étudiants HEMEC validé"},
  {t:"Note plancher + seuil validation UE",s:"todo",p:"c"},
  {t:"Calcul rattrapage (2 modes)",s:"todo",p:"h"},
  {t:"Mentions officielles (P/AB/B/TB)",s:"done",n:"Barème CAMES : Passable/Assez Bien/Bien/Très Bien"},
  {t:"Vue v_resultats_etudiants + v_progression_lmd",s:"todo"},
  {t:"Tests SQL (validé/ajourné/compensation/absence…)",s:"todo",p:"c"},
]},
{id:5,label:"S5",title:"Sprint 5 — Délibérations et relevés",tasks:[
  {t:"Page délibération par semestre",s:"done",n:"Module Délibérations complet — 02/06/2026"},
  {t:"Calcul en masse + validation jury",s:"done",n:"Batch calcul + overrides jury individuels"},
  {t:"Verrouillage post-délibération",s:"done",n:"Session → statut cloture, irréversible"},
  {t:"Procès-verbal de délibération PDF",s:"done",n:"jsPDF — en-tête navy, tableau, bilan, zones signatures"},
  {t:"Génération relevé PDF officiel",s:"done",n:"jsPDF — validé sur HEMEC M1 le 02/06/2026"},
  {t:"Numéro unique de relevé",s:"done",n:"Format REL-XXXXXXXX généré à la volée"},
  {t:"QR code de vérification",s:"done",n:"qrcode-generator + canvas → PNG → jsPDF"},

  {t:"Portail étudiant (téléchargement relevé)",s:"partial"},
]},
{id:6,label:"S6",title:"Sprint 6 — Présences, finances, notifications",tasks:[
  {t:"Création séances CM/TD/TP",s:"partial",n:"Table seances présente"},
  {t:"Appel (présent/absent/retard/justifié)",s:"partial"},
  {t:"Seuil d'exclusion configurable",s:"todo"},
  {t:"Exclusion auto ou validation manuelle",s:"partial",n:"v_absences_ue présente"},
  {t:"Impact absence sur résultats",s:"todo"},
  {t:"Rubriques de frais + facturation auto",s:"todo"},
  {t:"Paiements partiels + reçus PDF",s:"todo"},
  {t:"Blocage relevé si impayés (configurable)",s:"todo"},
  {t:"Notifications email (note, relevé, paiement…)",s:"partial",n:"Brevo configuré — Edge Function send-email opérationnelle"},
  {t:"Modèles de notifications configurables",s:"todo"},
  {t:"Modal Enseignant (CRUD complet)",s:"todo"},
  {t:"Modal Message interne",s:"todo"},
]},
{id:7,label:"S7",title:"Sprint 7 — Production & sécurité",tasks:[
  {t:"Audit sécurité RLS complet (par rôle + ecole_id)",s:"partial",p:"c",n:"73 gardes SELECT + 33 UPDATE + 21 DELETE ajoutés"},
  {t:"Calculs académiques déplacés côté SQL",s:"partial",p:"c",n:"fn_resultats_semestre + fn_resultats_annuels côté Supabase"},
  {t:"Performance (index, pagination, cache résultats)",s:"todo",p:"h",n:"3 index composites créés — pagination étudiants à optimiser"},
  {t:"Tests automatisés (unitaires + intégration)",s:"todo",p:"h"},
  {t:"Documentation API + guide admin",s:"todo"},
  {t:"Procédure sauvegarde/restauration",s:"todo"},
  {t:"Monitoring + alertes",s:"todo"},
  {t:"Dashboard prospects (CRM interne)",s:"todo"},
  {t:"Environnement de démo avec données fictives",s:"todo",n:"École HEMEC utilisée pour démos"},
  {t:"Déploiement production",s:"partial",n:"app.edulink.bj + edulink.bj + portail.edulink.bj actifs"},
]},
];
let currentFilter='all';
const pts={done:1,partial:0.5,todo:0,blocked:0};
function render(){
  const c=document.getElementById('sprints');
  c.innerHTML='';
  let totalScore=0,totalTasks=0;
  D.forEach(sp=>{
    totalScore+=sp.tasks.reduce((a,t)=>a+pts[t.s],0);
    totalTasks+=sp.tasks.length;
    const tasks=currentFilter==='all'?sp.tasks:sp.tasks.filter(t=>t.s===currentFilter);
    if(currentFilter!=='all'&&!tasks.length)return;
    const pct=Math.round(sp.tasks.reduce((a,t)=>a+pts[t.s],0)/sp.tasks.length*100);
    const div=document.createElement('div');
    div.className='sprint';
    const hdr=document.createElement('div');
    hdr.className='sprint-hdr';
    hdr.innerHTML=`<div class="sprint-num">${sp.label}</div><div class="sprint-title">${sp.title}</div><div class="sprint-meta"><div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div><span class="sprint-pct">${pct}%</span></div><i class="ti ti-chevron-down chev" aria-hidden="true"></i>`;
    div.appendChild(hdr);
    const body=document.createElement('div');
    body.className='tasks';body.style.display='none';
    tasks.forEach(t=>{
      const row=document.createElement('div');row.className='task';
      const bclass={done:'b-done',partial:'b-partial',todo:'b-todo',blocked:'b-blocked'}[t.s];
      const blabel={done:'Fait',partial:'Partiel',todo:'À faire',blocked:'Bloqué'}[t.s];
      const pri=t.p==='c'?`<span class="pri pri-c">critique</span>`:t.p==='h'?`<span class="pri pri-h">haute</span>`:'';
      row.innerHTML=`<span class="badge ${bclass}">${blabel}</span><div class="task-main"><div class="task-title">${t.t}${pri}</div>${t.n?`<div class="task-note">${t.n}</div>`:''}</div>`;
      body.appendChild(row);
    });
    div.appendChild(body);
    hdr.addEventListener('click',()=>{
      const open=body.style.display!=='none';
      body.style.display=open?'none':'block';
      hdr.querySelector('.chev').classList.toggle('open',!open);
    });
    c.appendChild(div);
  });
  const gp=Math.round(totalScore/totalTasks*100);
  document.getElementById('global-fill').style.width=gp+'%';
  document.getElementById('global-pct').textContent=gp+'%';
}
function filter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
render();
document.querySelectorAll('.sprint-hdr')[0]?.click();
</script>
